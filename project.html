    <script>
        // Critical: Apply theme and language before rendering to prevent flash
        (function() {
            try {
                // Apply theme
                const savedTheme = localStorage.getItem('portfolio_theme') || 'midnight';
                if (savedTheme === 'clean-office' || savedTheme === 'midnight') {
                    document.documentElement.setAttribute('data-theme', savedTheme);
                }
                
                // Apply language - Default to English for international audience
                const savedLang = localStorage.getItem('portfolio_language') || 'en';
                if (savedLang === 'el' || savedLang === 'en') {
                    document.documentElement.setAttribute('lang', savedLang);
                }
            } catch(e) {
                // Fallback to defaults if localStorage fails
                document.documentElement.setAttribute('data-theme', 'midnight');
                document.documentElement.setAttribute('lang', 'en');
            }
        })();
    </script>

        .lightbox {

            right: 1.5rem;
            color: white;

            background: rgba(255, 255, 255, 0.1);

    <script>
        lucide.createIcons();

        // Menu Toggle
        const menuBtn = document.getElementById('mobile-menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu-overlay');
        const menuCloseBtn = document.getElementById('mobile-menu-close');
        
        if (menuBtn && mobileMenu) {
            menuBtn.addEventListener('click', () => {
                mobileMenu.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        }
        
        if (menuCloseBtn && mobileMenu) {
            menuCloseBtn.addEventListener('click', () => {
                mobileMenu.classList.remove('active');
                document.body.style.overflow = '';
            });
        }

        // Initialize Project Page
        document.addEventListener('DOMContentLoaded', () => {
            // Get ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            
            const container = document.getElementById('project-container');
            const errorState = document.getElementById('error-state');
            
            if (!projectId || !projectsData[projectId]) {
                errorState.classList.remove('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            const project = projectsData[projectId];
            
            // Fallback for missing icon
            const iconImg = document.getElementById('project-icon');
            iconImg.src = project.icon;
            iconImg.onerror = function() {
                this.style.display='none'; 
                this.nextElementSibling.style.display='block';
            };
            
            // Handle i18n
            const titleEl = document.getElementById('project-title');
            titleEl.setAttribute('data-i18n', project.titleKey);
            
            const descEl = document.getElementById('project-description');
            descEl.setAttribute('data-i18n', project.descKey);
            
            // Populate Tags
            const tagsContainer = document.getElementById('project-tags');
            tagsContainer.innerHTML = ''; // Clear previous tags if any
            project.tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'px-3 py-1 bg-tertiary border border-theme text-sm text-theme rounded-full font-medium';
                span.textContent = tag;
                tagsContainer.appendChild(span);
            });
            
            // Handle Download
            if (project.downloadAvailable) {
                document.getElementById('download-available').classList.remove('hidden');
                const link = document.getElementById('download-link');
                link.href = project.downloadLink;
                link.setAttribute('download', project.downloadFilename);
                
                const text = document.getElementById('download-text');
                if (project.downloadType === 'installer') {
                    text.setAttribute('data-i18n', 'btnDownloadInstaller');
                } else {
                    text.setAttribute('data-i18n', 'btnDownloadApk');
                }
            } else if (project.externalLink) {
                document.getElementById('external-link-container').classList.remove('hidden');
                document.getElementById('external-link').href = project.externalLink;
            } else {
                document.getElementById('download-unavailable').classList.remove('hidden');
            }
            
            // Handle Screenshots
            if (project.screenshots && project.screenshots.length > 0) {
                document.getElementById('screenshots-section').classList.remove('hidden');
                const screensContainer = document.getElementById('screenshots-container');
                
                project.screenshots.forEach((prefix, index) => {
                    const div = document.createElement('div');
                    // Add width based on mobile vs desktop. Here we use 80% width on mobile, 33% on desktop
                    div.className = 'relative min-w-[80%] md:min-w-[33.33%] h-[300px] md:h-[400px] snap-start flex-shrink-0 rounded-xl overflow-hidden';
                    
                    const fullUrl = prefix + '-1200w.jpg';
                    const imgUrl = prefix + '-800w.jpg';
                    const imgUrl400 = prefix + '-400w.jpg';
                    
                    // Note: Fuel Tracker has custom converted naming, checking if prefix contains "converted"
                    const isDirectFile = prefix.endsWith('.png') || prefix.endsWith('.jpg') || !prefix.includes('optimized_assets');
                    
                    const img = document.createElement('img');
                    if (isDirectFile) {
                        img.src = prefix + '.jpg'; // simplified fallback
                        img.setAttribute('data-fullsize', prefix + '.jpg');
                    } else {
                        img.src = imgUrl;
                        img.srcset = `${imgUrl400} 400w, ${imgUrl} 800w, ${fullUrl} 1200w`;
                        img.sizes = '(max-width: 768px) 80vw, 33vw';
                        img.setAttribute('data-fullsize', fullUrl);
                    }
                    
                    img.alt = `Screenshot ${index + 1}`;
                    img.className = 'w-full h-full object-contain md:object-cover lazy-image lightbox-image cursor-pointer hover:opacity-90 transition-opacity bg-black/20';
                    img.loading = 'lazy';
                    img.onerror = function() { this.style.display='none'; };
                    
                    div.appendChild(img);
                    screensContainer.appendChild(div);
                });
            }

            // Force translation update for newly added elements
            if (window.languageManager) { window.languageManager.updateContent(); }
            if (typeof updateTranslations === 'function') {
                updateTranslations(currentLang);
            }
            
            // Setup Lightbox for newly added images
            setupLightbox();
        });
        
        // Lightbox Logic
        function setupLightbox() {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.querySelector('.lightbox-close');

            document.querySelectorAll('.lightbox-image').forEach(img => {
                img.addEventListener('click', (e) => {
                    const fullsizeUrl = img.getAttribute('data-fullsize') || img.src;
                    lightboxImg.src = fullsizeUrl;
                    lightbox.classList.add('active');
                    document.body.style.overflow = 'hidden'; // Prevent scrolling
                });
            });

            const closeLightbox = () => {
                lightbox.classList.remove('active');
                setTimeout(() => {
                    lightboxImg.src = '';
                }, 300);
                document.body.style.overflow = '';
            };

            closeBtn.addEventListener('click', closeLightbox);
            
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                    closeLightbox();
                }
            });
        }
    </script>
